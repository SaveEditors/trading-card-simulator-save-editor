<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="1" stop-color="#101028"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#55c3ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.88" cy="0.2" r="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="spark" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="1" fill="#ffffff" opacity="0.18"/>
      <circle cx="9" cy="8" r="1" fill="#ffffff" opacity="0.10"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="320" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1200" height="320" fill="url(#glow2)"/>

  <!-- Foil banner -->
  <g filter="url(#softShadow)">
    <rect x="56" y="52" width="560" height="216" rx="26" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="78" y="78" width="96" height="96" rx="20" fill="url(#foil)" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="78" y="78" width="96" height="96" rx="20" fill="url(#spark)" opacity="0.7"/>
    <path d="M104 108c0-6 5-11 11-11h22c6 0 11 5 11 11v36c0 6-5 11-11 11h-22c-6 0-11-5-11-11v-36z" fill="#0b0b12" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.35"/>
    <path d="M113 116h26" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.28"/>
    <path d="M113 128h18" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.22"/>

    <text x="196" y="112" fill="#f3f4ff" font-family="Segoe UI,system-ui,-apple-system,Arial" font-size="30" font-weight="800">
      Trading Card Shop Simulator
      <tspan x="196" dy="28" font-size="18" font-weight="700" fill-opacity="0.85">(Game Preview)</tspan>
    </text>
    <text x="196" y="172" fill="#f3f4ff" fill-opacity="0.78" font-family="Segoe UI,system-ui,-apple-system,Arial" font-size="18" font-weight="600">
      Save Editor (card-themed • readable • safe-by-default)
    </text>
    <text x="196" y="206" fill="#f3f4ff" fill-opacity="0.60" font-family="Segoe UI,system-ui,-apple-system,Arial" font-size="14" font-weight="500">
      Edit coins • levels • inventory totals/prices • binder progress • unlock flags
    </text>
  </g>

  <!-- Card stack motif -->
  <g filter="url(#softShadow)">
    <rect x="720" y="84" width="300" height="180" rx="24" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="760" y="108" width="170" height="216" rx="22" fill="#000000" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="780" y="92" width="170" height="216" rx="22" fill="#000000" fill-opacity="0.26" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="800" y="76" width="170" height="216" rx="22" fill="#000000" fill-opacity="0.30" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="812" y="90" width="146" height="60" rx="16" fill="url(#foil)" opacity="0.65"/>
    <rect x="812" y="160" width="146" height="10" rx="5" fill="#ffffff" opacity="0.10"/>
    <rect x="812" y="180" width="108" height="10" rx="5" fill="#ffffff" opacity="0.08"/>
    <circle cx="952" cy="122" r="10" fill="#ffffff" opacity="0.12"/>
  </g>
</svg>
